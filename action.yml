name: "OpenWrt SDK"
description: "Build OpenWrt packages via the SDK"
author: aparcar
runs:
  using: 'composite'
  steps:
    - run: |
        artifacts_dir="${ARTIFACTS_DIR:-$GITHUB_WORKSPACE}"
        feed_dir="${FEED_DIR:-$GITHUB_WORKSPACE}"

        echo "artifacts_dir=$artifacts_dir" >> "$GITHUB_OUTPUT"
        echo "feed_dir=$feed_dir" >> "$GITHUB_OUTPUT"

        if [ "${CCACHE:-0}" = '1' ]; then
          ccache_dir="${CCACHE_DIR:-$GITHUB_WORKSPACE/.ccache}"
          ccache_container="${CONTAINER:-ghcr.io/openwrt/sdk}"
          ccache_arch="${ARCH:-mips_24kc}"
          ccache_scope="${ccache_container}-${ccache_arch}"
          ccache_scope="${ccache_scope//[^A-Za-z0-9_.-]/-}"
          ccache_prefix="${CCACHE_CACHE_PREFIX:-ccache-${RUNNER_OS:-Linux}-$ccache_scope}"

          echo "ccache_enabled=1" >> "$GITHUB_OUTPUT"
          echo "ccache_dir=$ccache_dir" >> "$GITHUB_OUTPUT"
          echo "ccache_key=$ccache_prefix-${GITHUB_RUN_ID:-0}" >> "$GITHUB_OUTPUT"
          {
            echo 'ccache_restore_keys<<EOF'
            echo "$ccache_prefix-"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        else
          echo "ccache_enabled=0" >> "$GITHUB_OUTPUT"
        fi

        if [ "${SDK_CACHE:-0}" = '1' ]; then
          sdk_cache_dir="${SDK_CACHE_DIR:-${RUNNER_TEMP:-$GITHUB_WORKSPACE}/openwrt-sdk-cache}"
          sdk_cache_container="${CONTAINER:-ghcr.io/openwrt/sdk}"
          sdk_cache_arch="${ARCH:-mips_24kc}"
          sdk_cache_scope="${sdk_cache_container}-${sdk_cache_arch}"
          sdk_cache_scope="${sdk_cache_scope//[^A-Za-z0-9_.-]/-}"
          sdk_cache_prefix="${SDK_CACHE_PREFIX:-sdk-cache-${RUNNER_OS:-Linux}-$sdk_cache_scope}"

          echo "sdk_cache_enabled=1" >> "$GITHUB_OUTPUT"
          echo "sdk_cache_dir=$sdk_cache_dir" >> "$GITHUB_OUTPUT"
          echo "sdk_cache_key=$sdk_cache_prefix-${GITHUB_RUN_ID:-0}" >> "$GITHUB_OUTPUT"
          {
            echo 'sdk_cache_restore_keys<<EOF'
            echo "$sdk_cache_prefix-"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        else
          echo "sdk_cache_enabled=0" >> "$GITHUB_OUTPUT"
        fi
      shell: bash
      id: inputs
    - run: mkdir -p "${{ steps.inputs.outputs.ccache_dir }}"
      shell: bash
      if: steps.inputs.outputs.ccache_enabled == '1'
    - run: mkdir -p "${{ steps.inputs.outputs.sdk_cache_dir }}"
      shell: bash
      if: steps.inputs.outputs.sdk_cache_enabled == '1'
    -
      name: Restore ccache
      if: steps.inputs.outputs.ccache_enabled == '1'
      uses: actions/cache@v5
      with:
        path: ${{ steps.inputs.outputs.ccache_dir }}
        key: ${{ steps.inputs.outputs.ccache_key }}
        restore-keys: ${{ steps.inputs.outputs.ccache_restore_keys }}
    -
      name: Restore SDK cache
      if: steps.inputs.outputs.sdk_cache_enabled == '1'
      uses: actions/cache@v5
      with:
        path: ${{ steps.inputs.outputs.sdk_cache_dir }}
        key: ${{ steps.inputs.outputs.sdk_cache_key }}
        restore-keys: ${{ steps.inputs.outputs.sdk_cache_restore_keys }}
    - run: sudo chown -R 1000:1000 ${{ steps.inputs.outputs.artifacts_dir }} ${{ steps.inputs.outputs.feed_dir }}
      shell: bash
    - run: sudo chown -R 1000:1000 "${{ steps.inputs.outputs.ccache_dir }}"
      shell: bash
      if: steps.inputs.outputs.ccache_enabled == '1'
    - run: sudo chown -R 1000:1000 "${{ steps.inputs.outputs.sdk_cache_dir }}"
      shell: bash
      if: steps.inputs.outputs.sdk_cache_enabled == '1'
    -
      name: Set up Docker QEMU
      uses: docker/setup-qemu-action@v4
    -
      name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    -
      name: Build Docker container image
      uses: docker/build-push-action@v7
      env:
        DOCKER_BUILD_SUMMARY: false
      with:
        push: false
        tags: sdk
        context: ${{ github.action_path }}
        build-args: |
          CONTAINER
          ARCH
        load: true

    - run: |
        ccache_args=()
        if [ "${CCACHE:-0}" = '1' ]; then
          ccache_args=(
            --env CCACHE=1
            --env CCACHE_DIR=/ccache
            --env CCACHE_MAXSIZE
            --env CCACHE_COMPILERCHECK
            --env CCACHE_RECACHE
            -v "${{ steps.inputs.outputs.ccache_dir }}:/ccache"
          )
        fi

        sdk_cache_args=()
        if [ "${SDK_CACHE:-0}" = '1' ]; then
          sdk_cache_args=(
            --env SDK_CACHE=1
            --env SDK_CACHE_DIR=/sdk-cache
            -v "${{ steps.inputs.outputs.sdk_cache_dir }}:/sdk-cache"
          )
        fi

        docker run --rm \
          --env BUILD \
          --env BUILD_LOG \
          --env EXTRA_FEEDS \
          --env FEEDNAME \
          --env IGNORE_ERRORS \
          --env KEY_BUILD \
          --env PRIVATE_KEY \
          --env NO_DEFAULT_FEEDS \
          --env NO_REFRESH_CHECK \
          --env NO_SHFMT_CHECK \
          --env PACKAGES \
          --env REPLACE_GOLANG \
          --env REPLACE_GOLANG_REPO \
          --env REPLACE_GOLANG_BRANCH \
          --env REPLACE_GOLANG_COMMIT \
          --env INDEX \
          --env V \
          "${ccache_args[@]}" \
          "${sdk_cache_args[@]}" \
          -v ${{ steps.inputs.outputs.artifacts_dir }}:/artifacts \
          -v ${{ steps.inputs.outputs.feed_dir }}:/feed \
          sdk
      shell: bash
    - run: sudo chown -R --reference=${{ steps.inputs.outputs.artifacts_dir }}/.. ${{ steps.inputs.outputs.artifacts_dir }}
      shell: bash
      if: always()
    - run: sudo chown -R --reference=${{ steps.inputs.outputs.feed_dir }}/.. ${{ steps.inputs.outputs.feed_dir }}
      shell: bash
      if: always()
    - run: sudo chown -R "$(id -u):$(id -g)" "${{ steps.inputs.outputs.ccache_dir }}"
      shell: bash
      if: always() && steps.inputs.outputs.ccache_enabled == '1'
    - run: sudo chown -R "$(id -u):$(id -g)" "${{ steps.inputs.outputs.sdk_cache_dir }}"
      shell: bash
      if: always() && steps.inputs.outputs.sdk_cache_enabled == '1'
